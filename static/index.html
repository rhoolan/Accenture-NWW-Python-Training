<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variance Calculator</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="app">
        <section class="card">
            <h1>Variance Calculator</h1>
            <p>Enter a list of integer scores (0-100) separated by commas.</p>

            <label for="scores">Scores</label>
            <input id="scores" name="scores" type="text" placeholder="e.g. 85, 87, 88" />

            <button id="calculate">Calculate Variance</button>

            <div id="result" class="result" aria-live="polite"></div>
            <div id="loading" class="loading" aria-live="polite">
                <div class="spinner"></div>
                <span>Generating Explanation</span>
            </div>
            <div id="explanation" class="explanation" aria-live="polite"></div>
            <div id="errors" class="errors" aria-live="polite"></div>
        </section>
    </main>

    <script>
        const calculateBtn = document.getElementById('calculate');
        const scoresInput = document.getElementById('scores');
        const resultNode = document.getElementById('result');
        const loadingNode = document.getElementById('loading');
        const explanationNode = document.getElementById('explanation');
        const errorsNode = document.getElementById('errors');

        // Initialize loading as hidden
        loadingNode.classList.remove('visible');

        function renderError(msg) {
            errorsNode.textContent = msg;
            resultNode.textContent = '';
            loadingNode.classList.remove('visible');
            explanationNode.textContent = '';
            errorsNode.classList.add('visible');
            resultNode.classList.remove('visible');
            explanationNode.classList.remove('visible');
        }

        function renderResult(variance) {
            errorsNode.textContent = '';
            errorsNode.classList.remove('visible');
            resultNode.textContent = `Variance: ${variance.toFixed(4)}`;
            resultNode.classList.add('visible');
            loadingNode.classList.add('visible');
            explanationNode.classList.remove('visible');
            explanationNode.textContent = '';
        }

        function renderExplanation(explanation) {
            loadingNode.classList.remove('visible');
            explanationNode.textContent = explanation;
            explanationNode.classList.add('visible');
        }

        async function fetchExplanation(variance, scores) {
            try {
                console.log('Fetching explanation for variance:', variance, 'scores:', scores);
                const response = await fetch('/api/variance-explanation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ variance, scores })
                });

                console.log('Response status:', response.status);
                const json = await response.json();
                console.log('Response data:', json);
                
                if (!response.ok) {
                    console.error('Explanation error:', json.error);
                    loadingNode.classList.remove('visible');
                    explanationNode.textContent = `⚠️ Error fetching explanation: ${json.error}`;
                    explanationNode.classList.add('visible');
                    return;
                }

                renderExplanation(json.explanation);
            } catch (err) {
                console.error('Failed to fetch explanation:', err.message);
                loadingNode.classList.remove('visible');
                explanationNode.textContent = `⚠️ Error: ${err.message}`;
                explanationNode.classList.add('visible');
            }
        }

        calculateBtn.addEventListener('click', async () => {
            const raw = scoresInput.value.trim();
            if (!raw) {
                renderError('Please enter one or more scores.');
                return;
            }

            const values = raw.split(',').map(v => v.trim()).filter(v => v !== '');
            if (!values.length) {
                renderError('Please provide valid score values.');
                return;
            }

            const scores = values.map(n => Number(n));
            if (scores.some(n => Number.isNaN(n) || !Number.isFinite(n) || !Number.isInteger(n))) {
                renderError('All scores must be integers.');
                return;
            }

            if (scores.some(n => n < 0 || n > 100)) {
                renderError('Scores must be between 0 and 100.');
                return;
            }

            if (scores.length > 10) {
                renderError('Only up to 10 scores are allowed.');
                return;
            }

            try {
                const response = await fetch('/api/variance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scores })
                });

                const json = await response.json();
                if (!response.ok) {
                    renderError(json.error || 'Unknown error from server.');
                    return;
                }

                renderResult(json.variance);
                
                // Fetch AI explanation asynchronously
                fetchExplanation(json.variance, scores);
            } catch (err) {
                renderError('Network error: ' + err.message);
            }
        });
    </script>
</body>
</html>
